name: test
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.3
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  geocoding: ^4.0.0
  http: ^1.5.0
  permission_handler: ^12.0.1
  geofencing_api: ^2.0.0
  flutter_local_notifications: ^19.4.2
  firebase_core: ^4.1.0
  cloud_firestore: ^6.0.1
  google_maps_flutter: ^2.13.1
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: HindiFont
      fonts:
        - asset: assets/fonts/YatraOne-Regular.ttf
